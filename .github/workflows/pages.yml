name: Deploy Blog to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate posts/index.json
        run: |
          echo "Validating posts/index.json..."
          python3 -c "
          import json, sys, os

          with open('posts/index.json') as f:
              posts = json.load(f)

          errors = []
          for p in posts:
              slug = p.get('slug', '')
              required = ['slug', 'title', 'date', 'description', 'tags', 'cover_image', 'status']
              missing = [k for k in required if not p.get(k)]
              if missing:
                  errors.append(f'{slug}: missing fields {missing}')
              if not os.path.exists(f'posts/{slug}/index.html'):
                  errors.append(f'{slug}: missing posts/{slug}/index.html')
              if not os.path.exists(f'posts/{slug}/meta.json'):
                  errors.append(f'{slug}: missing posts/{slug}/meta.json')
              if p.get('status') not in ('draft', 'published'):
                  errors.append(f'{slug}: status must be draft or published')

              # A published post with no medium_url silently loses its
              # 'Read on Medium' link on the index (index.html renders it only
              # when medium_url is non-null). Eight posts drifted this way.
              if p.get('status') == 'published' and not p.get('medium_url'):
                  errors.append(
                      f'{slug}: status is published but medium_url is null — '
                      'the index will render no Medium link. Record the '
                      'canonical URL (AGENT.md step 8).'
                  )

              if p.get('medium_url') and '/p/' in p['medium_url']:
                  errors.append(
                      f'{slug}: medium_url uses the short /p/<id> form — '
                      'use the full canonical slug URL.'
                  )

              # index.json and meta.json must not disagree about publish state.
              meta_path = f'posts/{slug}/meta.json'
              if os.path.exists(meta_path):
                  with open(meta_path) as mf:
                      meta = json.load(mf)
                  for field in ('status', 'medium_url'):
                      if meta.get(field) != p.get(field):
                          errors.append(
                              f'{slug}: {field} differs between index.json '
                              f'({p.get(field)!r}) and meta.json '
                              f'({meta.get(field)!r})'
                          )

          if errors:
              print('VALIDATION ERRORS:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)

          print(f'OK — {len(posts)} post(s) validated.')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
